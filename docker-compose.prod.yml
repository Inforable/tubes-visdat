services:
  nginx:
    image: nginx:alpine
    container_name: visdat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./certbot-data:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot
    env_file:
      - .env
    networks:
      - visdat-network
    depends_on:
      - app
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  certbot:
    image: certbot/certbot
    container_name: visdat-certbot
    restart: unless-stopped
    volumes:
      - ./certbot-data:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    env_file:
      - .env
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 7d & wait $${!}; done'"
